name: cms-publish

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, e.g. cms-v1.2.3'
        required: true
        type: string

concurrency:
  group: cms-publish-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          if ! echo "$TAG" | grep -Eq '^cms-v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid tag '$TAG'. Expected format: cms-vX.Y.Z, e.g. cms-v1.2.3" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
          fetch-depth: 1

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to registry.yesidlopez.de
        uses: docker/login-action@v3
        with:
          registry: registry.yesidlopez.de
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push lulo-cms image
        uses: docker/build-push-action@v6
        with:
          context: ./cms
          file: ./cms/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: registry.yesidlopez.de/lulo-cms:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
