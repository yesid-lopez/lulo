name: cms-publish

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, e.g. cms-v1.2.3'
        required: true
        type: string

concurrency:
  group: cms-publish-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

env:
  IMAGE: registry.yesidlopez.de/lulo-cms

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          if ! echo "$TAG" | grep -Eq '^cms-v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid tag '$TAG'. Expected format: cms-vX.Y.Z, e.g. cms-v1.2.3" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG"

  build:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Prepare platform pair
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 1

      - uses: docker/setup-buildx-action@v3

      - name: Log in to registry.yesidlopez.de
        uses: docker/login-action@v3
        with:
          registry: registry.yesidlopez.de
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./cms
          file: ./cms/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=cms-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=cms-${{ env.PLATFORM_PAIR }}
          provenance: false

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Log in to registry.yesidlopez.de
        uses: docker/login-action@v3
        with:
          registry: registry.yesidlopez.de
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            -t "${IMAGE}:${TAG}" \
            $(printf "${IMAGE}@sha256:%s " *)
        env:
          IMAGE: ${{ env.IMAGE }}
          TAG: ${{ needs.prepare.outputs.tag }}

      - name: Inspect image
        run: |
          docker buildx imagetools inspect "${IMAGE}:${TAG}"
        env:
          IMAGE: ${{ env.IMAGE }}
          TAG: ${{ needs.prepare.outputs.tag }}
