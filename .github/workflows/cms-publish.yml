name: cms-publish

on:
  push:
    branches:
      - main
    paths:
      - 'cms/**'
      - '.github/workflows/cms-publish.yml'
  workflow_dispatch:

concurrency:
  group: cms-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Compute image tag
        id: tag
        run: |
          COMMIT_TS=$(TZ=UTC git show -s --format=%cd --date=format-local:%Y%m%d.%H%M%S HEAD)
          TAG="v${COMMIT_TS}.${GITHUB_SHA::7}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to registry.yesidlopez.de
        uses: docker/login-action@v3
        with:
          registry: registry.yesidlopez.de
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push lulo-cms image
        uses: docker/build-push-action@v6
        with:
          context: ./cms
          file: ./cms/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: registry.yesidlopez.de/lulo-cms:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
